<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MapLibre Layer Factory - Demo</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" />
  <style>
    body { margin: 0; padding: 0; }
    #map { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script type="module">
    import { Map } from 'maplibre-gl';
    import { MapLibreLayerFactory } from './src/index.ts';
    import './src/index.css';

    function createCirclePolygon(centerLon, centerLat, radiusLon, radiusLat, points = 32) {
        const coords = [];
        for (let i = 0; i <= points; i++) {
            const angle = (i * 2 * Math.PI) / points;
            const lon = centerLon + radiusLon * Math.cos(angle);
            const lat = centerLat + radiusLat * Math.sin(angle);
            coords.push([lon, lat]);
        }
        return {
            type: "Polygon",
            coordinates: [coords]
        };
    }

    const map = new Map({
      container: 'map',
      style: {
        version: 8,
        sources: {},
        layers: []
      },
      center: [11.5, 44.2],
      zoom: 7.5
    });

    const layerFactory = new MapLibreLayerFactory({
      orientation: "horizontal",
      withLabel: true,
      labelStyle: { tag: { textTransform: "uppercase" } }
    });
    map.addControl(layerFactory, 'top-left');

    map.on("load", () => {
        map.addSource("osm", {
            type: "raster",
            tiles: [
                "https://a.tile.openstreetmap.org/{z}/{x}/{y}.png",
                "https://b.tile.openstreetmap.org/{z}/{x}/{y}.png",
                "https://c.tile.openstreetmap.org/{z}/{x}/{y}.png",
            ],
            tileSize: 256,
            attribution: "Open Street Map"
        });
        map.addSource("glc", {
            type: "raster",
            tiles: ["https://storage.googleapis.com/lcl_tiles/GLCLU2020/composite2020/{z}/{x}/{y}.png"],
            tileSize: 256,
            attribution: "Global Land Cover and Land Use 2000 and 2020"
        });
        map.addSource("italy", {
            type: "geojson",
            data: {
            "geometry": {
                "coordinates": [
                    [
                        [6.6, 36.6],
                        [18.5, 36.6],
                        [18.5, 47.1],
                        [6.6, 47.1],
                        [6.6, 36.6]
                    ]
                ],
                "type": "Polygon"
            },
            "properties": {
                "name": "polygon",
                "resolution": [
                    2000,
                    2000,
                    50
                ],
                "size": [
                    256000.0,
                    256000.0
                ]
            },
            "type": "Feature"
        }
        });
        map.addSource("rimini-seaside", {
            type: "geojson",
            data: {
                type: "Feature",
                geometry: createCirclePolygon(12.8653, 44.0576, 0.051, 0.037),
                properties: {
                    name: "Rimini Seaside"
                }
            }
        });
        map.addSource("reggio-emilia-mountain", {
            type: "geojson",
            data: {
                type: "Feature",
                geometry: createCirclePolygon(10.4, 44.3, 0.051, 0.037),
                properties: {
                    name: "Reggio Emilia Mountain Area"
                }
            }
        });
        map.addSource("bologna", {
            type: "geojson",
            data: {
                type: "Feature",
                geometry: createCirclePolygon(11.3426, 44.4949, 0.051, 0.037),
                properties: {
                    name: "Bologna"
                }
            }
        });

        map.addLayer({
            id: "osm",
            type: "raster",
            source: "osm",
            layout: { visibility: "none" },
            metadata: {
              name: "OpenStreetMap",
              caption: "30m"
            }
        });
        map.addLayer({
            id: "glc",
            type: "raster",
            source: "glc",
            layout: { visibility: "visible" },
            metadata: {
              name: "Global Land Cover",
              caption: "10m",
              placeholder: 'https://placehold.co/40x40'
            }
        });
        map.addLayer({
            id: "italy",
            type: "line",
            source: "italy",
            paint: { "line-color": "#ff6600", "line-width": 2 },
            layout: { visibility: "visible" },
            metadata: {
                overlay: true,
                name: "Italy"
            }
        });
        map.addLayer({
            id: "rimini-seaside",
            type: "fill",
            source: "rimini-seaside",
            paint: {
                "fill-color": "#007cbf",
                "fill-opacity": 0.6,
                "fill-outline-color": "#ffffff"
            },
            layout: { visibility: "visible" },
            metadata: {
                overlay: true,
                group: "Emilia Romagna",
                name: "Rimini Seaside"
            }
        });
        map.addLayer({
            id: "reggio-emilia-mountain",
            type: "fill",
            source: "reggio-emilia-mountain",
            paint: {
                "fill-color": "#2ca02c",
                "fill-opacity": 0.6,
                "fill-outline-color": "#ffffff"
            },
            layout: { visibility: "visible" },
            metadata: {
                overlay: true,
                group: "Emilia Romagna",
                name: "Reggio Emilia Mountain Area"
            }
        });
        map.addLayer({
            id: "bologna",
            type: "fill",
            source: "bologna",
            paint: {
                "fill-color": "#d62728",
                "fill-opacity": 0.6,
                "fill-outline-color": "#ffffff"
            },
            layout: { visibility: "visible" },
            metadata: {
                overlay: true,
                group: "Emilia Romagna",
                name: "Bologna"
            }
        });
    });
  </script>
</body>
</html>
